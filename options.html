<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Jable 收藏管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0c;
    --bg-secondary: #141418;
    --bg-card: #1a1a1f;
    --bg-hover: #222228;
    --accent: #e8a84c;
    --accent-dim: #b8843a;
    --accent-glow: rgba(232, 168, 76, 0.15);
    --text-primary: #f0ece4;
    --text-secondary: #8a8690;
    --text-dim: #5a5660;
    --border: #2a2a30;
    --danger: #d9534f;
    --success: #5cb85c;
    --font-display: 'Sora', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-display);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Film grain overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0.03;
    z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    position: relative;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .header h1 {
    font-family: var(--font-display);
    font-weight: 300;
    font-size: 32px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-primary);
  }

  .header h1 span {
    color: var(--accent);
    font-weight: 600;
  }

  .header p {
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* Stats Bar */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 48px;
    padding: 24px;
    background: var(--bg-secondary);
    border-radius: 12px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }

  .stat {
    text-align: center;
  }

  .stat-value {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    display: block;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .toolbar-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  select, input {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 10px 14px;
    border-radius: 8px;
    font-family: var(--font-display);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  select:hover, input:hover {
    border-color: var(--accent-dim);
  }

  select:focus, input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  input[type="text"] {
    min-width: 280px;
  }

  .page-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .page-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .page-btn:hover:not(:disabled) {
    background: var(--bg-hover);
    border-color: var(--accent-dim);
  }

  .page-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .page-info {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-secondary);
    padding: 0 12px;
  }

  /* Video Grid */
  .video-list {
    background: var(--bg-secondary);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .video-item {
    display: grid;
    grid-template-columns: 120px 1fr auto;
    gap: 20px;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s ease;
  }

  .video-item:last-child {
    border-bottom: none;
  }

  .video-item:hover {
    background: var(--bg-hover);
  }

  .video-thumb {
    position: relative;
    aspect-ratio: 16/9;
    border-radius: 6px;
    overflow: hidden;
    background: var(--bg-card);
  }

  .video-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .video-thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 6px;
    pointer-events: none;
  }

  .video-info {
    min-width: 0;
  }

  .video-id {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 4px;
  }

  .video-title {
    font-size: 14px;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 6px;
  }

  .video-time {
    font-size: 11px;
    color: var(--text-dim);
  }

  .video-actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .btn-danger {
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
  }

  .btn-danger:hover {
    background: var(--danger);
    color: white;
  }

  /* Empty State */
  .empty-state {
    padding: 80px 40px;
    text-align: center;
  }

  .empty-state-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 24px;
    opacity: 0.3;
  }

  .empty-state h3 {
    font-size: 18px;
    font-weight: 400;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .empty-state p {
    font-size: 13px;
    color: var(--text-dim);
  }

  /* Pagination */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    gap: 16px;
  }

  /* Data Actions */
  .data-actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 24px;
  }

  .btn-secondary {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }

  .btn-secondary:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  .btn-accent {
    background: var(--accent);
    color: var(--bg-primary);
  }

  .btn-accent:hover {
    background: var(--accent-dim);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    padding: 14px 28px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 10000;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .toast.success {
    background: var(--success);
    color: white;
  }

  .toast.error {
    background: var(--danger);
    color: white;
  }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 40px;
    gap: 16px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading p {
    color: var(--text-dim);
    font-size: 13px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .toolbar {
      flex-direction: column;
      align-items: stretch;
    }

    .toolbar-group {
      justify-content: space-between;
    }

    input[type="text"] {
      min-width: 100%;
    }

    .video-item {
      grid-template-columns: 80px 1fr;
    }

    .video-actions {
      grid-column: 1 / -1;
      justify-content: flex-end;
    }

    .stats-bar {
      gap: 24px;
    }

    .stat-value {
      font-size: 22px;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Jable <span>Collection</span></h1>
      <p>视频收藏管理</p>
    </header>

    <div class="stats-bar">
      <div class="stat">
        <span class="stat-value" id="total-count">-</span>
        <span class="stat-label">总收藏</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="display-count">-</span>
        <span class="stat-label">当前显示</span>
      </div>
    </div>

    <div class="toolbar">
      <div class="toolbar-group">
        <span class="toolbar-label">排序</span>
        <select id="sort-select">
          <option value="addedTime-desc">最新添加</option>
          <option value="addedTime-asc">最早添加</option>
          <option value="videoId-asc">番号 A→Z</option>
          <option value="videoId-desc">番号 Z→A</option>
        </select>
      </div>

      <div class="toolbar-group">
        <input type="text" id="search-input" placeholder="搜索番号或标题...">
      </div>

      <div class="toolbar-group page-controls">
        <button class="page-btn" id="prev-btn">‹</button>
        <span class="page-info" id="page-info">1 / 1</span>
        <button class="page-btn" id="next-btn">›</button>
        <select id="page-size">
          <option value="20">20</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
        </select>
      </div>
    </div>

    <div class="video-list" id="video-list">
      <div class="loading">
        <div class="spinner"></div>
        <p>加载中...</p>
      </div>
    </div>

    <div class="data-actions">
      <button class="btn btn-secondary" id="export-data">导出</button>
      <button class="btn btn-secondary" id="import-data">导入</button>
      <button class="btn btn-danger" id="clear-data">清空</button>
      <input type="file" id="import-file" accept=".json" style="display:none">
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="options.js"></script>
</body>
</html>
