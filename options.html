<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Jable 收藏管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0c;
    --bg-secondary: #141418;
    --bg-card: #1a1a1f;
    --bg-hover: #222228;
    --accent: #e8a84c;
    --accent-dim: #b8843a;
    --accent-glow: rgba(232, 168, 76, 0.15);
    --text-primary: #f0ece4;
    --text-secondary: #8a8690;
    --text-dim: #5a5660;
    --border: #2a2a30;
    --danger: #d9534f;
    --success: #5cb85c;
    --font-display: 'Sora', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-display);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0.03;
    z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  }

  .container {
    max-width: 80%;
    margin: 0 auto;
    padding: 32px 24px;
  }

  .header {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 20px;
  }

  .header-left h1 {
    font-family: var(--font-display);
    font-weight: 300;
    font-size: 28px;
    letter-spacing: 3px;
  }

  .header-left h1 span {
    color: var(--accent);
    font-weight: 600;
  }

  .header-left p {
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .header-stats {
    display: flex;
    gap: 32px;
  }

  .header-stat {
    text-align: right;
  }

  .header-stat-value {
    font-family: var(--font-mono);
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
  }

  .header-stat-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .toolbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .toolbar-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  select, input {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 10px 14px;
    border-radius: 8px;
    font-family: var(--font-display);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  select:hover, input:hover {
    border-color: var(--accent-dim);
  }

  select:focus, input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  input[type="text"] {
    width: 240px;
  }

  .page-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .page-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .page-btn:hover:not(:disabled) {
    background: var(--bg-hover);
    border-color: var(--accent-dim);
  }

  .page-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .page-info {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-secondary);
    min-width: 70px;
    text-align: center;
  }

  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .video-card {
    background: var(--bg-secondary);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: all 0.25s ease;
  }

  .video-card:hover {
    border-color: var(--accent-dim);
    cursor: pointer;
  }

  .video-thumb {
    position: relative;
    aspect-ratio: 16/10;
    overflow: hidden;
    background: var(--bg-card);
  }

  .video-thumb img,
  .video-preview {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .video-preview {
    position: absolute;
    top: 0;
    left: 0;
    display: none;
  }

  .video-card:hover .video-preview {
    display: block;
  }

  .video-card:hover .video-thumb > img {
    display: none;
  }

  .video-thumb::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    pointer-events: none;
  }

  .video-content {
    padding: 16px;
  }

  .video-title {
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 12px;
    min-height: 40px;
  }

  .video-meta {
    display: flex;
    justify-content: flex-start;
    align-items: center;
  }

  .video-tags {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .video-id-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
    padding: 2px 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  .video-time {
    font-size: 11px;
    color: var(--text-dim);
  }

  .btn {
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .empty-state {
    grid-column: 1 / -1;
    padding: 80px 40px;
    text-align: center;
    background: var(--bg-secondary);
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .empty-state-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 20px;
    opacity: 0.3;
  }

  .empty-state h3 {
    font-size: 16px;
    font-weight: 400;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .empty-state p {
    font-size: 13px;
    color: var(--text-dim);
  }

  .pagination-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 24px;
    gap: 16px;
  }

  .pagination-info {
    font-size: 12px;
    color: var(--text-dim);
  }

  .data-actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .btn-secondary {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 10px 20px;
  }

  .btn-secondary:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  .btn-accent {
    background: var(--accent);
    color: var(--bg-primary);
    padding: 10px 20px;
  }

  .btn-accent:hover {
    background: var(--accent-dim);
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    padding: 14px 28px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 10000;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .toast.success {
    background: var(--success);
    color: white;
  }

  .toast.error {
    background: var(--danger);
    color: white;
  }

  .loading {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 40px;
    gap: 16px;
    background: var(--bg-secondary);
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading p {
    color: var(--text-dim);
    font-size: 13px;
  }

  .site-tabs,
  .source-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
  }

  .site-tab,
  .source-tab {
    padding: 6px 14px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--text-secondary);
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .site-tab:hover,
  .source-tab:hover {
    color: var(--text-primary);
    background: var(--bg-hover);
  }

  .site-tab.active,
  .source-tab.active {
    background: var(--accent);
    color: var(--bg-primary);
  }

  .source-tabs.hidden {
    display: none;
  }

  .video-source-badge {
    font-size: 10px;
    font-family: var(--font-mono);
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
  }

  .video-source-badge.favorites {
    background: rgba(232, 168, 76, 0.15);
    color: var(--accent);
    border: 1px solid rgba(232, 168, 76, 0.3);
  }

  .video-source-badge.watch-later {
    background: rgba(92, 184, 92, 0.15);
    color: var(--success);
    border: 1px solid rgba(92, 184, 92, 0.3);
  }

  .video-source-badge.both {
    background: rgba(255, 255, 255, 0.08);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }

  @media (max-width: 768px) {
    .header {
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    .header-stats {
      width: 100%;
      justify-content: flex-start;
    }

    .toolbar {
      flex-direction: column;
      align-items: stretch;
    }

    .toolbar-left, .toolbar-right {
      flex-wrap: wrap;
    }

    input[type="text"] {
      width: 100%;
    }

    .video-grid {
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-left">
        <h1><span id="site-title">Jable</span> <span>Collection</span></h1>
        <p id="site-subtitle">视频收藏管理</p>
      </div>
      <div class="header-stats">
        <div class="header-stat">
          <div class="header-stat-value" id="total-count">-</div>
          <div class="header-stat-label" id="total-count-label">总收藏</div>
        </div>
        <div class="header-stat">
          <div class="header-stat-value" id="display-count">-</div>
          <div class="header-stat-label">当前显示</div>
        </div>
      </div>
    </header>

    <div class="toolbar">
      <div class="toolbar-left">
        <div class="site-tabs" id="site-tabs">
          <button class="site-tab active" data-site="jable">Jable</button>
          <button class="site-tab" data-site="missav">MissAV</button>
        </div>
        <div class="source-tabs" id="source-tabs">
          <button class="source-tab active" data-source="all">全部</button>
          <button class="source-tab" data-source="favorites">收藏</button>
          <button class="source-tab" data-source="watchLater">稍后观看</button>
        </div>
        <select id="sort-select">
          <option value="original">原始顺序</option>
          <option value="videoId-asc">番号 A→Z</option>
          <option value="videoId-desc">番号 Z→A</option>
        </select>
        <input type="text" id="search-input" placeholder="搜索番号或标题...">
      </div>

      <div class="toolbar-right">
        <div class="page-controls">
          <button class="page-btn" id="prev-btn">‹</button>
          <span class="page-info" id="page-info">1 / 1</span>
          <button class="page-btn" id="next-btn">›</button>
        </div>
        <select id="page-size">
          <option value="12">12/页</option>
          <option value="24" selected>24/页</option>
          <option value="48">48/页</option>
        </select>
      </div>
    </div>

    <div class="video-grid" id="video-list">
      <div class="loading">
        <div class="spinner"></div>
        <p>加载中...</p>
      </div>
    </div>

    <div class="data-actions">
      <button class="btn btn-secondary" id="export-data">导出</button>
      <button class="btn btn-secondary" id="import-data">导入</button>
      <button class="btn btn-secondary" id="clear-data" style="border-color: var(--danger); color: var(--danger);">清空</button>
      <input type="file" id="import-file" accept=".json" style="display:none">
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="options.js"></script>
</body>
</html>
