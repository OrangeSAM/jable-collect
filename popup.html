<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 350px;
    padding: 15px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  
  .header {
    text-align: center;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid #eee;
  }
  
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  
  .stat-item {
    background: #f5f5f5;
    padding: 10px;
    border-radius: 6px;
    text-align: center;
  }
  
  .stat-number {
    font-size: 24px;
    font-weight: bold;
    color: #333;
  }
  
  .stat-label {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
  }
  
  .actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  .btn {
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: background-color 0.2s;
  }
  
  .btn-primary {
    background: #007bff;
    color: white;
  }
  
  .btn-primary:hover {
    background: #0056b3;
  }
  
  .btn-secondary {
    background: #6c757d;
    color: white;
  }
  
  .btn-secondary:hover {
    background: #545b62;
  }
  
  .category-quick-list {
    max-height: 150px;
    overflow-y: auto;
    margin-top: 15px;
  }
  
  .category-quick-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    border-radius: 4px;
    margin-bottom: 4px;
    background: #f8f9fa;
    font-size: 13px;
  }
  
  .category-color {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 8px;
  }
</style>
</head>
<body>
<div class="header">
  <h2>收藏分类管理</h2>
</div>

<div class="stats">
  <div class="stat-item">
    <div class="stat-number" id="total-favorites">0</div>
    <div class="stat-label">总收藏</div>
  </div>
  <div class="stat-item">
    <div class="stat-number" id="total-categories">0</div>
    <div class="stat-label">分类数</div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-primary" id="sync-data">同步收藏2数据</button>
  <button class="btn btn-secondary" id="manage-categories">管理分类</button>
  <button class="btn btn-secondary" id="export-favorites">导出收藏</button>
  <button class="btn btn-secondary" id="open-options">设置选项</button>
</div>

<div class="category-quick-list" id="category-list">
  <!-- 分类列表将在这里动态生成 -->
</div>

<script src="popup.js"></script>
</body>
</html>
